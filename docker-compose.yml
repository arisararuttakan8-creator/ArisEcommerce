services:
  postgres:
    image: postgres:16-alpine
    container_name: aris_ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aris_ecommerce
      POSTGRES_PASSWORD: aris_ecommerce
      POSTGRES_DB: aris_ecommerce
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aris_ecommerce -d aris_ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
